spring:
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:worktogether}
    username: ${DB_USER:wt}
    password: ${DB_PASSWORD:changeme}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
  flyway:
    enabled: true
    locations: classpath:db/migration
  servlet:
    multipart:
      max-file-size: 25MB
      max-request-size: 25MB

app:
  jwt:
    secret: ${JWT_SECRET:please-change-this-secret-key-in-production}
    expiry-ms: ${JWT_EXPIRY_MS:900000}
    refresh-expiry-ms: ${JWT_REFRESH_EXPIRY_MS:604800000}
  admin:
    init-email: ${ADMIN_INIT_EMAIL:admin@example.com}
    init-password: ${ADMIN_INIT_PASSWORD:Admin1234!}
  upload:
    dir: ${UPLOAD_DIR:/app/uploads}

server:
  port: 8080

logging:
  level:
    com.worktogether: INFO
    org.springframework.security: WARN
