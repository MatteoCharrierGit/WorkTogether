spring:
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:worktogether}
    username: ${DB_USER:wt}
    password: ${DB_PASSWORD:changeme}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
  flyway:
    enabled: true
    locations: classpath:db/migration
  servlet:
    multipart:
      max-file-size: 25MB
      max-request-size: 25MB
  mail:
    # Default su Gmail; username/password vanno forniti via env (app password Google).
    host: ${MAIL_HOST:smtp.gmail.com}
    port: ${MAIL_PORT:587}
    username: ${MAIL_USERNAME:}
    password: ${MAIL_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
          connectiontimeout: 5000
          timeout: 5000
          writetimeout: 5000

app:
  jwt:
    secret: ${JWT_SECRET:please-change-this-secret-key-in-production}
    expiry-ms: ${JWT_EXPIRY_MS:900000}
    refresh-expiry-ms: ${JWT_REFRESH_EXPIRY_MS:604800000}
  admin:
    init-email: ${ADMIN_INIT_EMAIL:admin@example.com}
    init-password: ${ADMIN_INIT_PASSWORD:Admin1234!}
  upload:
    dir: ${UPLOAD_DIR:/app/uploads}
  ai:
    # Segreto per cifrare la chiave OpenRouter a riposo (fallback: JWT secret).
    secret: ${AI_SECRET:${JWT_SECRET:please-change-this-secret-key-in-production}}
    base-url: ${OPENROUTER_BASE_URL:https://openrouter.ai/api/v1}
  livekit:
    # Media server SFU per voce/screen share (Fase 2). Credenziali d'infra: se vuote la voce è disattivata.
    # url = URL pubblico WSS che il browser usa per connettersi (es. wss://livekit.example.com).
    url: ${LIVEKIT_URL:}
    api-key: ${LIVEKIT_API_KEY:}
    api-secret: ${LIVEKIT_API_SECRET:}
    # Durata del token d'accesso emesso da Spring (secondi).
    token-ttl-seconds: ${LIVEKIT_TOKEN_TTL:3600}
  mail:
    # Mittente delle email inviate dall'app (default: account SMTP configurato).
    from: ${MAIL_FROM:${MAIL_USERNAME:}}
  frontend:
    # URL pubblico del frontend, usato per costruire i link (es. accettazione inviti).
    base-url: ${FRONTEND_BASE_URL:http://localhost:5173}

server:
  port: 8080

logging:
  level:
    com.worktogether: INFO
    org.springframework.security: WARN
