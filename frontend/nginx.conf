# Connection header condizionale: "upgrade" solo per le vere richieste di upgrade WebSocket,
# altrimenti "close". SockJS usa più trasporti sotto /ws/ (info/xhr/xhr_streaming/websocket):
# forzare sempre "upgrade" rompe/bufferizza i trasporti non-websocket.
map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Gzip
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml;

    # API proxy → backend. proxy_buffering off: lo streaming SSE dell'agente AI (text/event-stream)
    # deve arrivare token per token, non bufferizzato.
    location /api/ {
        proxy_pass http://backend:8080/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_buffering off;
        proxy_read_timeout 3600s;
    }

    # WebSocket proxy → backend (STOMP su SockJS). Connection condizionale + buffering off: i frame
    # devono essere consegnati in tempo reale, non trattenuti finché non arriva un'altra richiesta.
    location /ws/ {
        proxy_pass http://backend:8080/ws/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_set_header Host $host;
        proxy_buffering off;
        proxy_read_timeout 3600s;
    }

    # Service worker e manifest PWA: vanno sempre rivalidati, altrimenti gli
    # aggiornamenti dell'app non arrivano mai ai client già installati.
    location = /sw.js {
        add_header Cache-Control "no-cache";
    }
    location = /manifest.webmanifest {
        add_header Cache-Control "no-cache";
        types { } default_type application/manifest+json;
    }

    # SPA fallback
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Static asset caching
    location ~* \.(js|css|png|jpg|ico|svg|woff2?)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}
